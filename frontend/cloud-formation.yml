AWSTemplateFormatVersion: '2010-09-09'
Description: Wemojema Apps Admin — static SPA (S3 + CloudFront, default domain)

Parameters:
  ServiceName:
    Type: String
    Default: apps-admin-web
  ApiOriginDomain:
    Type: String
    Description: API Gateway host (no scheme) — served same-origin under /api/* so there's no CORS.
  AdminDomain:
    Type: String
    Default: admin.wemojema.com
    Description: Custom domain for the admin SPA (must be covered by CertificateArn).
  CertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:819693013672:certificate/766d3bb9-7741-4cf6-ab85-b973dd2142c5
    Description: ACM cert (us-east-1) covering AdminDomain — the *.wemojema.com wildcard.

Resources:

  # Private by default; the OAC bucket policy below grants read only to CloudFront.
  # (devops role lacks s3:PutBucketPublicAccessBlock, so no explicit block config here.)
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ServiceName}-${AWS::AccountId}"

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ServiceName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Ref ServiceName
        Aliases:
          - !Ref AdminDomain
        DefaultRootObject: index.html
        Origins:
          - Id: S3
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: Api
            DomainName: !Ref ApiOriginDomain
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
        # /api/* is served from the API Gateway origin — same-origin, so no CORS.
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: Api
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
        DefaultCacheBehavior:
          TargetOriginId: S3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
          ResponseHeadersPolicyId: !Ref NoIndexHeadersPolicy
          AllowedMethods: [GET, HEAD, OPTIONS]
        # SPA client-side routing: serve index.html for unknown paths
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  # Tells search engines not to index the admin panel — applied to every SPA response
  # regardless of crawler behavior (stronger than robots.txt / meta alone).
  NoIndexHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${ServiceName}-noindex"
        CustomHeadersConfig:
          Items:
            - Header: X-Robots-Tag
              Value: "noindex, nofollow"
              Override: true

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AssetsBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  BucketName:
    Value: !Ref AssetsBucket
  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
  DistributionId:
    Value: !Ref Distribution
  AdminUrl:
    Value: !Sub "https://${AdminDomain}"
