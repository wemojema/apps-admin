micronaut:
  application:
    name: apps-admin-api
  server:
    # Micronaut's CORS filter answers preflight OPTIONS (200) before security runs.
    # Permissive origins is fine — every endpoint is bearer-token protected. API Gateway
    # does NOT also do CORS (would duplicate the header and $default-route OPTIONS to a 401).
    cors:
      enabled: true

# Admin API is itself a wemojema-auth tenant — only users of the admin tenant pass @WemojemaSecured.
wemojema:
  auth:
    host: ${WEMOJEMA_AUTH_HOST:admin.auth.wemojema.com}

aws:
  tenants-table: ${TENANTS_TABLE:wemojema-auth-tenants}
  admin-queue-url: ${ADMIN_QUEUE_URL:}

logger:
  levels:
    com.wemojema.apps.admin: INFO
